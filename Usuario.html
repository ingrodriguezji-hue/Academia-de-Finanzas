<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Datos - Gold Edition</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-image: linear-gradient(rgba(12, 30, 38, 0.85), rgba(12, 30, 38, 0.95)), 
                        url('—Pngtree—close-up of a detailed graph_16127929.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      padding: 30px 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .back-button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: #d4af37;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(to bottom, #f9e27d, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* FORM CARD */
    .form-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 20px; /* Radio consistente con el logo */
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .label-with-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .label-with-icon span {
      font-size: 18px;
      color: #d4af37;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #cbdce0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 10px; /* Radio reducido según pedido */
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: rgba(12, 30, 38, 0.6);
      color: white;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #d4af37;
      background: rgba(12, 30, 38, 0.8);
    }

    /* CHECKBOXES DORADOS */
    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #fff;
      cursor: pointer;
    }

    .checkbox-item input {
      width: 18px;
      height: 18px;
      accent-color: #d4af37;
    }

    /* BOTONES PREMIUM */
    .buttons {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-save {
      background: linear-gradient(145deg, #d4af37, #8a6d3b);
      color: #0c1e26;
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-save:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-next {
      background: transparent;
      color: #d4af37;
      border: 2px solid #d4af37;
      margin-top: 10px;
    }

    .btn-next:hover {
      background: rgba(212, 175, 55, 0.1);
      transform: translateX(5px);
    }

    .message {
      margin-top: 15px;
      text-align: center;
      color: #4cd964;
      font-size: 14px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <div class="header">
      <button class="back-button" onclick="volverMenu()">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h1>Mis Datos Personales</h1>
    </div>

    <div class="form-card">

      <div class="form-group">
        <div class="label-with-icon">
          <span class="material-symbols-rounded">work</span>
          <label>Situación laboral</label>
        </div>
        <select id="situacion">
          <option value="">Seleccionar</option>
          <option>Empleado</option>
          <option>Independiente</option>
          <option>Empresario</option>
          <option>Desempleado</option>
        </select>
      </div>

      <div class="form-group">
        <div class="label-with-icon">
          <span class="material-symbols-rounded">payments</span>
          <label>Ingresos mensuales ($)</label>
        </div>
        <input type="number" id="ingresos" placeholder="Ej: 500000">
      </div>

      <div class="form-group">
        <div class="label-with-icon">
          <span class="material-symbols-rounded">account_balance</span>
          <label>Patrimonio total estimado ($)</label>
        </div>
        <input type="number" id="patrimonio" placeholder="Ej: 20000000">
      </div>

      <div class="form-group">
        <div class="label-with-icon">
          <span class="material-symbols-rounded">inventory_2</span>
          <label>Bienes Actuales</label>
        </div>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" value="Propiedades"> Propiedades</label>
          <label class="checkbox-item"><input type="checkbox" value="Vehículos"> Vehículos</label>
          <label class="checkbox-item"><input type="checkbox" value="Ahorros"> Ahorros</label>
          <label class="checkbox-item"><input type="checkbox" value="Inversiones"> Inversiones</label>
        </div>
      </div>

      <div class="form-group">
        <div class="label-with-icon">
          <span class="material-symbols-rounded">school</span>
          <label>Nivel de educación financiera</label>
        </div>
        <select id="educacion">
          <option value="">Seleccionar</option>
          <option>Bajo</option>
          <option>Medio</option>
          <option>Alto</option>
        </select>
      </div>

      <div class="form-group">
        <div class="label-with-icon">
          <span class="material-symbols-rounded">star_half</span>
          <label>Conocimiento inversiones (1 a 5)</label>
        </div>
        <input type="number" id="nivel" min="1" max="5" placeholder="1 = bajo / 5 = alto">
      </div>

      <div class="buttons">
        <button class="btn btn-save" onclick="guardarDatos()">
          <span class="material-symbols-rounded">save</span> Guardar Datos
        </button>
        <button class="btn btn-back" onclick="volverMenu()">
          Volver al menú
        </button>
        <button class="btn btn-next" onclick="irObjetivos()">
          Continuar <span class="material-symbols-rounded">arrow_forward</span>
        </button>
      </div>

      <div class="message" id="mensaje">¡Datos actualizados con éxito! ✔</div>

    </div>

  </div>

  <script>
    function volverMenu() {
      window.location.href = "index.html";
    }

    function irObjetivos() {
      window.location.href = "mis-objetivos.html";
    }

    function guardarDatos() {
      const situacion = document.getElementById("situacion").value;
      const ingresos = document.getElementById("ingresos").value;
      const educacion = document.getElementById("educacion").value;
      const patrimonio = document.getElementById("patrimonio").value;
      const nivel = document.getElementById("nivel").value;

      if (!situacion || !ingresos || !educacion) {
        alert("Por favor completá los campos obligatorios.");
        return;
      }

      const bienesSeleccionados = [];
      document.querySelectorAll(".checkbox-group input:checked").forEach(el => {
        bienesSeleccionados.push(el.value);
      });

      const datos = {
        situacion,
        ingresos,
        educacion,
        patrimonio,
        bienes: bienesSeleccionados,
        nivel
      };

      localStorage.setItem("misDatos", JSON.stringify(datos));

      const mensaje = document.getElementById("mensaje");
      mensaje.style.display = "block";

      setTimeout(() => {
        mensaje.style.display = "none";
      }, 2000);
    }

    window.onload = function () {
      const datosGuardados = JSON.parse(localStorage.getItem("misDatos"));

      if (datosGuardados) {
        document.getElementById("situacion").value = datosGuardados.situacion;
        document.getElementById("ingresos").value = datosGuardados.ingresos;
        document.getElementById("educacion").value = datosGuardados.educacion;
        document.getElementById("patrimonio").value = datosGuardados.patrimonio;
        document.getElementById("nivel").value = datosGuardados.nivel;

        document.querySelectorAll(".checkbox-group input").forEach(el => {
          el.checked = (datosGuardados.bienes || []).includes(el.value);
        });
      }
    };
  </script>

</body>
</html>
