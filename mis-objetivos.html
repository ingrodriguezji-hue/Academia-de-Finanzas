<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Objetivos - Gold Edition</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-image: linear-gradient(rgba(12, 30, 38, 0.85), rgba(12, 30, 38, 0.95)), 
                        url('—Pngtree—close-up of a detailed graph_16127929.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      padding: 30px 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .back-button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: #d4af37;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(to bottom, #f9e27d, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* SECCIONES */
    .section {
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 12px;
      color: #d4af37;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    /* CHECKBOX GROUP - GLASS DESIGN */
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .checkbox-item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px;
      border-radius: 12px; /* Radios chicos */
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .checkbox-item:hover {
      background: rgba(212, 175, 55, 0.1);
      border-color: rgba(212, 175, 55, 0.5);
      transform: translateX(5px);
    }

    /* Estilo cuando está chequeado */
    .checkbox-item input:checked + span {
      color: #f9e27d;
      font-weight: 700;
    }

    .checkbox-item input {
      accent-color: #d4af37;
      width: 18px;
      height: 18px;
    }

    /* BOTONES */
    .buttons {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-save {
      background: linear-gradient(145deg, #d4af37, #8a6d3b);
      color: #0c1e26;
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-save:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-next {
      background: transparent;
      color: #d4af37;
      border: 2px solid #d4af37;
      margin-top: 10px;
    }

    .btn-next:hover {
      background: rgba(212, 175, 55, 0.1);
      transform: translateX(5px);
    }

    .message {
      margin-top: 15px;
      text-align: center;
      color: #4cd964;
      font-size: 14px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <div class="app-container">

    <div class="header">
      <button class="back-button" onclick="volverMenu()">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h1>Mis Objetivos</h1>
    </div>

    <div class="section">
      <div class="section-title">
        <span class="material-symbols-rounded" style="font-size: 18px;">schedule</span>
        Corto Plazo
      </div>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" value="Salir de deudas"> <span>Salir de deudas</span></label>
        <label class="checkbox-item"><input type="checkbox" value="Organizar gastos"> <span>Organizar gastos</span></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        <span class="material-symbols-rounded" style="font-size: 18px;">hourglass_empty</span>
        Mediano Plazo
      </div>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" value="Incrementar ahorro"> <span>Incrementar ahorro</span></label>
        <label class="checkbox-item"><input type="checkbox" value="Generar ingresos extra"> <span>Generar ingresos extra</span></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        <span class="material-symbols-rounded" style="font-size: 18px;">rocket_launch</span>
        Largo Plazo
      </div>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" value="Invertir"> <span>Invertir</span></label>
        <label class="checkbox-item"><input type="checkbox" value="Aumentar patrimonio"> <span>Aumentar patrimonio</span></label>
        <label class="checkbox-item"><input type="checkbox" value="Libertad financiera"> <span>Libertad financiera</span></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        <span class="material-symbols-rounded" style="font-size: 18px;">grade</span>
        Extra
      </div>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" value="Aprender finanzas"> <span>Aprender finanzas</span></label>
        <label class="checkbox-item"><input type="checkbox" value="Mejorar hábitos financieros"> <span>Mejorar hábitos financieros</span></label>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-save" onclick="guardarObjetivos()">
        <span class="material-symbols-rounded">check_circle</span> Guardar Objetivos
      </button>
      <button class="btn btn-back" onclick="volverMenu()">Volver al menú</button>

      <button class="btn btn-next" onclick="irIngresos()">
        Continuar <span class="material-symbols-rounded">arrow_forward</span>
      </button>
    </div>

    <div class="message" id="mensaje">¡Objetivos guardados con éxito! ✔</div>

  </div>

  <script>
    function volverMenu() {
      window.location.href = "index.html";
    }

    function irIngresos() {
      window.location.href = "mis-ingresos.html";
    }

    function guardarObjetivos() {
      const seleccionados = [];

      document.querySelectorAll("input[type='checkbox']:checked").forEach(el => {
        seleccionados.push(el.value);
      });

      localStorage.setItem("misObjetivos", JSON.stringify(seleccionados));

      const mensaje = document.getElementById("mensaje");
      mensaje.style.display = "block";

      setTimeout(() => {
        mensaje.style.display = "none";
      }, 2000);
    }

    window.onload = function () {
      const objetivosGuardados = JSON.parse(localStorage.getItem("misObjetivos"));

      if (objetivosGuardados) {
        document.querySelectorAll("input[type='checkbox']").forEach(el => {
          el.checked = objetivosGuardados.includes(el.value);
        });
      }
    };
  </script>

</body>
</html>
