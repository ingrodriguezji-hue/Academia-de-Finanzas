<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadro de Resultados - Premium</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background-image: linear-gradient(rgba(12, 30, 38, 0.8), rgba(12, 30, 38, 0.8)), 
                    url('fondo-cuadro.PNG');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: white;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.app-container {
  width: 100%;
  max-width: 420px;
  padding: 25px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 30px;
}

.back-button {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  backdrop-filter: blur(10px);
}

h1 { font-size: 20px; font-weight: 600; }

.card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  padding: 20px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  margin-bottom: 15px;
}

.cards-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 15px;
}

.card-small { padding: 15px 5px; }

.icon-3d {
  font-size: 28px;
  margin-bottom: 8px;
  display: block;
}

.card-small span {
  font-size: 10px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 5px;
}

.card-small h2 { font-size: 14px; }

.activos { color: #4cd964; text-shadow: 0 0 10px rgba(76, 217, 100, 0.3); }
.pasivos { color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.3); }
.patrimonio-color { color: #4facfe; text-shadow: 0 0 10px rgba(79, 172, 254, 0.3); }

.resultado {
  padding: 25px;
  border-radius: 24px;
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
  font-size: 22px;
}

.positivo {
  background: rgba(30, 95, 58, 0.4);
  border: 2px solid #4cd964;
  color: #4cd964;
}

.negativo {
  background: rgba(90, 31, 31, 0.4);
  border: 2px solid #ff6b6b;
  color: #ff6b6b;
}

.label { margin-top: 8px; font-size: 13px; color: #cbdce0; }

.section-title {
  margin: 25px 0 15px;
  font-size: 17px;
  color: #4cd964;
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.recom-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
    font-size: 16px;
}

.item-label {
    display: flex;
    align-items: center;
    gap: 12px;
}

.recom-icon {
    font-size: 24px;
    color: #8faab3;
}
</style>
</head>

<body>

<div class="app-container">

  <div class="header">
    <button class="back-button" onclick="volverMenu()">
        <span class="material-symbols-rounded">arrow_back</span>
    </button>
    <h1>Resultados</h1>
  </div>

  <div class="cards-row">
    <div class="card card-small">
      <span class="material-symbols-rounded activos icon-3d">account_balance_wallet</span>
      <span class="activos">Activos</span>
      <h2 id="ingresos">$0</h2>
    </div>

    <div class="card card-small">
      <span class="material-symbols-rounded pasivos icon-3d">credit_card</span>
      <span class="pasivos">Pasivos</span>
      <h2 id="gastos">$0</h2>
    </div>

    <div class="card card-small">
      <span class="material-symbols-rounded patrimonio-color icon-3d">monitoring</span>
      <span class="patrimonio-color">Neto</span>
      <h2 id="patrimonio">$0</h2>
    </div>
  </div>

  <div id="resultadoBox" class="card resultado">
    <div id="resValue">Resultado: $0</div>
    <div class="label" id="estado"></div>
  </div>

  <h2 class="section-title">
    <span class="material-symbols-rounded">insights</span> 
    Recomendaciones
  </h2>

  <div class="card" style="text-align: left;">
    <div class="item-label" style="margin-bottom: 10px;">
        <span class="material-symbols-rounded" style="color: #cbdce0; font-size: 24px;">safe</span>
        <span style="font-size: 16px; color: #cbdce0;">Fondo de Reserva (6 meses)</span>
    </div>
    <h2 id="fondoObjetivo">$0</h2>

    <div class="recom-item">
        <div class="item-label">
            <span class="material-symbols-rounded recom-icon">calendar_month</span>
            <span>Aporte mensual (10%)</span>
        </div>
        <span id="reservaMensual">$0</span>
    </div>
  </div>

  <div class="card" style="text-align: left;">
    <div class="recom-item">
        <div class="item-label">
            <span class="material-symbols-rounded recom-icon">savings</span>
            <span>Ahorro</span>
        </div>
        <span id="ahorro">$0</span>
    </div>

    <div class="recom-item">
        <div class="item-label">
            <span class="material-symbols-rounded recom-icon">query_stats</span>
            <span>Inversión</span>
        </div>
        <span id="inversion">$0</span>
    </div>
  </div>

</div>

<script>
function volverMenu() {
  window.location.href = "index.html";
}

// 🔥 ARREGLADO: estaba roto el script
function obtenerIngresos() {
  return Number(localStorage.getItem("totalIngresos")) || 0;
}

// 🔥 NUEVO: función backup más robusta
function obtenerIngresosTotal() {
  const estructurado = JSON.parse(localStorage.getItem("misIngresos")) || {};

  let total =
    (estructurado.sueldo || 0) +
    (estructurado.secundario || 0) +
    (estructurado.pasivo || 0) +
    (estructurado.otro1 || 0) +
    (estructurado.otro2 || 0) +
    (estructurado.otro3 || 0);

  if (!total || total === 0) {
    total = obtenerIngresos();
  }

  return total;
}

// 🔥 NUEVO: función debug
function debugFinanzas() {
  console.log("DEBUG INGRESOS:", localStorage.getItem("misIngresos"));
  console.log("DEBUG TOTAL:", localStorage.getItem("totalIngresos"));
  console.log("DEBUG GASTOS:", localStorage.getItem("misGastos"));
}

function calcularResultados() {

  const totalIngresos = obtenerIngresosTotal();

  const gastosData = JSON.parse(localStorage.getItem("misGastos")) || {};
  let totalGastos = 0;

  Object.values(gastosData).forEach(v => totalGastos += v || 0);

  const resultado = totalIngresos - totalGastos;

  document.getElementById("ingresos").innerText = "$" + totalIngresos.toLocaleString();
  document.getElementById("gastos").innerText = "$" + totalGastos.toLocaleString();
  document.getElementById("patrimonio").innerText = "$" + resultado.toLocaleString();

  document.getElementById("resValue").innerText = "Resultado: $" + resultado.toLocaleString();

  if (resultado >= 0) {
    resultadoBox.className = "card resultado positivo";
    estado.innerText = "✔ Flujo positivo";
  } else {
    resultadoBox.className = "card resultado negativo";
    estado.innerText = "⚠ Estás gastando más de lo que ganás";
  }

  document.getElementById("fondoObjetivo").innerText = "$" + (totalGastos * 6).toLocaleString();
  document.getElementById("reservaMensual").innerText = "$" + (totalIngresos * 0.10).toLocaleString();
  document.getElementById("ahorro").innerText = "$" + (totalIngresos * 0.10).toLocaleString();
  document.getElementById("inversion").innerText = "$" + (totalIngresos * 0.15).toLocaleString();

  debugFinanzas();
}

// 🔥 NUEVO: auto refresh si cambian datos
window.addEventListener("storage", calcularResultados);

window.onload = calcularResultados;
</script>

</body>
</html>
