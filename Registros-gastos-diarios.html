<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Gastos Diarios</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(160deg, #0c1e26, #122f3a);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

/* FORM */
.form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.filtros {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.filtros select {
  flex: 1;
  min-width: 100px;
}

input, select {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1b3a44;
  color: white;
}

/* BOTON */
.btn-add {
  background: #2c6f80;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

/* LISTA */
.lista {
  margin-top: 20px;
}

/* ITEM EN FILA */
.item {
  background: #1b3a44;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}

/* COLUMNAS */
.col-fecha {
  width: 70px;
  color: #8faab3;
  font-size: 11px;
}

.col-item {
  flex: 1;
  padding-left: 5px;
}

.col-rubro {
  width: 80px;
  text-align: right;
  color: #4cd964;
}

.col-monto {
  width: 80px;
  text-align: right;
  font-weight: bold;
}

.delete {
  margin-left: 10px;
  color: #ff6b6b;
  cursor: pointer;
}

/* TOTAL */
.total {
  margin-top: 15px;
  text-align: center;
  font-size: 18px;
}

/* GRAFICO */
canvas {
  margin-top: 20px;
  width: 100%;
}

/* LEYENDA */
.leyenda {
  margin-top: 15px;
}

/* VOLVER */
.back {
  margin-top: 20px;
  background: #1b3a44;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  color: white;
  border: none;
}

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <button onclick="volver()">←</button>
    <h2>Gastos Diarios</h2>
  </div>

  <!-- FORM -->
  <div class="form">
    <input type="text" id="item" placeholder="Concepto">
    
    <select id="rubro">
      <option>Salud</option>
      <option>Educación</option>
      <option>Salidas</option>
      <option>Transporte</option>
      <option>Hogar</option>
      <option>Bienestar</option>
      <option>Estética</option>
      <option>Deporte</option>
      <option>Alimentos</option>
      <option>Servicios</option>
      <option>Impuestos</option>
      <option>Deudas</option>
      <option>Inversiones</option>
      <option>Regalos</option>
      <option>Otros</option>
    </select>

    <input type="number" id="monto" placeholder="Monto">

    <button class="btn-add" onclick="agregar()">Agregar gasto</button>

    <div class="filtros">
      <select id="filtroMes" onchange="render()">
        <option value="">Mes</option>
        <option value="1">Enero</option>
        <option value="2">Febrero</option>
        <option value="3">Marzo</option>
        <option value="4">Abril</option>
        <option value="5">Mayo</option>
        <option value="6">Junio</option>
        <option value="7">Julio</option>
        <option value="8">Agosto</option>
        <option value="9">Septiembre</option>
        <option value="10">Octubre</option>
        <option value="11">Noviembre</option>
        <option value="12">Diciembre</option>
      </select>
      <select id="filtroAno" onchange="render()">
        <option value="">Año</option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
      </select>
      <select id="filtroRubro" onchange="render()">
        <option value="">Rubro</option>
        <option>Salud</option>
        <option>Educación</option>
        <option>Salidas</option>
        <option>Transporte</option>
        <option>Hogar</option>
        <option>Bienestar</option>
        <option>Estética</option>
        <option>Deporte</option>
        <option>Alimentos</option>
        <option>Servicios</option>
        <option>Impuestos</option>
        <option>Deudas</option>
        <option>Inversiones</option>
        <option>Regalos</option>
        <option>Otros</option>
      </select>
    </div>
  </div>

  <!-- LISTA -->
  <div class="lista" id="lista"></div>

  <!-- TOTAL -->
  <div class="total" id="total">$0</div>

  <!-- GRAFICO -->
  <canvas id="grafico"></canvas>

  <!-- LEYENDA -->
  <div class="leyenda" id="leyenda"></div>

  <!-- VOLVER -->
  <button class="back" onclick="volver()">Volver al menú</button>

</div>

<script>

let gastos = JSON.parse(localStorage.getItem("gastosDiarios")) || [];
gastos = gastos.map(g => ({
  ...g,
  fechaISO: g.fechaISO || new Date(g.fecha).toISOString()
}));

function volver() {
  window.location.href = "index.html";
}

function agregar() {
  const item = document.getElementById("item").value;
  const rubro = document.getElementById("rubro").value;
  const monto = parseFloat(document.getElementById("monto").value);

  if (!item || !monto) return;

  gastos.push({ 
    item, 
    rubro, 
    monto,
    fecha: new Date().toLocaleDateString(),
    fechaISO: new Date().toISOString()
  });

  guardar();
  render();
}

function eliminar(i) {
  gastos.splice(i, 1);
  guardar();
  render();
}

function guardar() {
  localStorage.setItem("gastosDiarios", JSON.stringify(gastos));
}

function obtenerFiltros() {
  return {
    mes: document.getElementById("filtroMes").value,
    ano: document.getElementById("filtroAno").value,
    rubro: document.getElementById("filtroRubro").value
  };
}

function parsearFecha(gasto) {
  if (gasto.fechaISO) {
    return new Date(gasto.fechaISO);
  }

  const fechaTexto = gasto.fecha || "";
  const partes = fechaTexto.split("/").map(Number);

  if (partes.length === 3) {
    const [dia, mes, ano] = partes;
    const anoCompleto = ano < 100 ? 2000 + ano : ano;
    return new Date(anoCompleto, mes - 1, dia);
  }

  return new Date(fechaTexto);
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const filtros = obtenerFiltros();
  const gastosFiltrados = gastos
    .map((g, index) => ({ g, index }))
    .filter(({ g }) => {
      const fecha = parsearFecha(g);

      if (filtros.mes && fecha.getMonth() + 1 !== Number(filtros.mes)) return false;
      if (filtros.ano && fecha.getFullYear() !== Number(filtros.ano)) return false;
      if (filtros.rubro && g.rubro !== filtros.rubro) return false;
      return true;
    });

  let total = 0;

  gastosFiltrados.forEach(({ g, index }) => {
    total += g.monto;

    lista.innerHTML += `
      <div class="item">
        <div class="col-fecha">${g.fecha}</div>
        <div class="col-item">${g.item}</div>
        <div class="col-rubro">${g.rubro}</div>
        <div class="col-monto">$${g.monto}</div>
        <span class="delete" onclick="eliminar(${index})">❌</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: $" + total.toLocaleString();

  dibujarGrafico(gastosFiltrados.map(({ g }) => g));
}

function dibujarGrafico(gastosLista) {

  const canvas = document.getElementById("grafico");
  const ctx = canvas.getContext("2d");

  canvas.width = 300;
  canvas.height = 300;

  let porRubro = {};

  gastosLista.forEach(g => {
    porRubro[g.rubro] = (porRubro[g.rubro] || 0) + g.monto;
  });

  const total = Object.values(porRubro).reduce((a, b) => a + b, 0);

  const colores = [
    "#4cd964","#ff6b6b","#5ac8fa","#ffd60a","#bf5af2",
    "#ff9f0a","#30d158","#64d2ff","#ff375f","#a2845e",
    "#00c7be","#ffcc00","#ff453a","#d0fd3e","#7d7aff"
  ];

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const leyenda = document.getElementById("leyenda");
  leyenda.innerHTML = "";

  if (total === 0) {
    return;
  }

  let start = 0;
  let i = 0;

  Object.entries(porRubro).forEach(([rubro, monto]) => {
    const porcentaje = ((monto / total) * 100).toFixed(1);
    const slice = (monto / total) * 2 * Math.PI;
    const color = colores[i % colores.length];

    ctx.beginPath();
    ctx.moveTo(150, 150);
    ctx.arc(150, 150, 120, start, start + slice);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    start += slice;

    leyenda.innerHTML += `
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
        <div>
          <span style="background:${color}; width:10px; height:10px; display:inline-block; border-radius:50%; margin-right:6px;"></span>
          ${rubro}
        </div>
        <div>${porcentaje}% • $${monto.toLocaleString()}</div>
      </div>
    `;
    i++;
  });
}

window.onload = render;

</script>

</body>
</html>
