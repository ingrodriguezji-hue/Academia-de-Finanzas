<!DOCTYPE html>
<html lang="es">
<head>
  
  <title>Mi App Finanzas</title>

  <!-- Manifest (clave para instalar la app) -->
<link rel="manifest" href="./manifest.json">
  <!-- Color de la barra del navegador en mobile -->
  <meta name="theme-color" content="#0f172a">

  <!-- Soporte para iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanzas">



  <!-- Icono para iPhone -->
 <link rel="apple-touch-icon" href="./icons/icon-192.png">
  
  <!-- Favicon básico -->
  <link rel="icon" href="./icons/icon-192.png">
</head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Sistema Financiero - Gold Edition</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      /* Fondo con la imagen y capa de oscuridad para resaltar el dorado */
      background-image: linear-gradient(rgba(12, 30, 38, 0.85), rgba(12, 30, 38, 0.95)), 
                        url('fondo-index.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* 👤 BOTON USUARIO DORADO */
    .user-btn {
      position: absolute;
      top: 30px;
      right: 25px;
      width: 60px;
      height: 60px;
      background: linear-gradient(145deg, #d4af37, #f9e27d);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: #0c1e26;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      transition: 0.3s;
      text-transform: uppercase;
    }

    .user-btn:hover {
      transform: translateY(-3px) rotate(5deg);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
    }
/* LOGO CON MARCO DORADO 3D Y BORDES REDONDEADOS EN % */
.logo-header {
  display: flex;
  justify-content: center;
  margin-top: 50px;
  margin-bottom: 20px;
}

.logo-header img {
  width: 140px;
  height: 110px;
  object-fit: cover;

  /* Redondeo en porcentaje (Ajusta el % a tu gusto) */
  border-radius: 15%; 

  /* Técnica de Marco Dorado que SI permite redondeo */
  border: 4px solid transparent;
  background-image: linear-gradient(rgba(12, 30, 38, 0.9), rgba(12, 30, 38, 0.9)), 
                    linear-gradient(145deg, #f9e27d, #d4af37, #8a6d3b);
  background-origin: border-box;
  background-clip: padding-box, border-box;

  /* Efecto 3D y Sombras */
  box-shadow: 
    0 10px 25px rgba(0,0,0,0.6),
    inset 0 0 12px rgba(212, 175, 55, 0.3);
  
  transition: all 0.3s ease;
  backdrop-filter: blur(5px);
}

.logo-header img:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(212, 175, 55, 0.4);
}
    /* TÍTULO */
    .content {
      text-align: center;
      margin-bottom: 20px;
    }

    .content h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      /* Degradado Dorado en Texto */
      background: linear-gradient(to bottom, #f9e27d, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    /* MENU */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }

    .menu a {
      text-decoration: none;
    }

    /* 🔥 BOTONES PREMIUM GOLD */
    .menu-button {
      position: relative;
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 18px 22px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
    }

    /* ICONOS DORADOS 3D */
    .btn-icon {
      font-size: 28px;
      background: linear-gradient(145deg, #f9e27d, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }

    .menu-button:hover {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid #d4af37;
      transform: scale(1.04);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
    }

    /* Brillo animado al pasar el mouse */
    .menu-button::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg);
      transition: 0.6s;
    }

    .menu-button:hover::after {
      left: 100%;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #8faab3;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="app-container">

  <div class="user-btn" onclick="irUsuario()">
    <span class="material-symbols-rounded">person</span>
    <span>Perfil</span>
  </div>

  <div class="logo-header">
    <img src="logo.png" alt="Finanzas">
  </div>
  <div class="content">
    <h1>Llevá tus finanzas al siguiente nivel</h1>

    </h1>
  </div>

  <div class="menu">

    <a href="Registros-gastos-diarios.html">
      <div class="menu-button">
        <span class="material-symbols-rounded btn-icon">account_balance_wallet</span>
        <span>Gastos Diarios</span>
      </div>
    </a>

    <a href="gastos-mensuales.html">
      <div class="menu-button">
        <span class="material-symbols-rounded btn-icon">event_note</span>
        <span>Gastos Mensuales</span>
      </div>
    </a>

    <a href="cuadro-de-resultados.html">
      <div class="menu-button">
        <span class="material-symbols-rounded btn-icon">analytics</span>
        <span>Análisis de Resultados</span>
      </div>
    </a>

    <a href="perfil-inversor-mas-cartera.html">
      <div class="menu-button">
        <span class="material-symbols-rounded btn-icon">psychology</span>
        <span>Perfil Inversor</span>
      </div>
    </a>

    <a href="Calculadora-de-interes-compuesto.html">
      <div class="menu-button">
        <span class="material-symbols-rounded btn-icon">calculate</span>
        <span>Estrategia de Interés</span>
      </div>
    </a>

  </div>

  <div class="footer">
    Elite Finance v2.0
  </div>

</div>

<script>
function irUsuario() {
  window.location.href = "Usuario.html";
}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("SW registrado"))
    .catch(err => console.log("Error SW:", err));
}
</script>
</body>
</html>
