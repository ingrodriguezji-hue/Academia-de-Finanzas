<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mi Sistema Financiero - Gold Edition</title>

  <link rel="manifest" href="/manifest.json">

  <meta name="theme-color" content="#0f172a">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanzas">

  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-image: linear-gradient(rgba(12, 30, 38, 0.85), rgba(12, 30, 38, 0.95)), 
                        url('fondo-index.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .user-btn {
      position: absolute;
      top: 30px;
      right: 25px;
      width: 60px;
      height: 60px;
      background: linear-gradient(145deg, #d4af37, #f9e27d);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: #0c1e26;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      transition: 0.3s;
      text-transform: uppercase;
    }

    .logo-header {
      display: flex;
      justify-content: center;
      margin-top: 50px;
      margin-bottom: 20px;
    }

    .logo-header img {
      width: 140px;
      height: 110px;
      object-fit: cover;
      border-radius: 15%;
      border: 4px solid transparent;
      background-image: linear-gradient(rgba(12, 30, 38, 0.9), rgba(12, 30, 38, 0.9)), 
                        linear-gradient(145deg, #f9e27d, #d4af37, #8a6d3b);
      background-origin: border-box;
      background-clip: padding-box, border-box;
    }

    .content {
      text-align: center;
      margin-bottom: 20px;
    }

    .content h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #f9e27d, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .menu a {
      text-decoration: none;
    }

    /* 🔥 BOTONES CON ESTILO 3D */
    .menu-button {
      padding: 16px;
      border-radius: 20px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(212, 175, 55, 0.3);
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: flex-start;
      backdrop-filter: blur(12px);
      transition: all 0.25s ease;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.05),
                  0 10px 20px rgba(0,0,0,0.4);
    }

    .menu-button:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 25px rgba(0,0,0,0.6);
      border-color: #d4af37;
    }

    /* 🔥 ICONO 3D */
    .icon-3d {
      font-size: 26px;
      padding: 10px;
      border-radius: 12px;
      background: linear-gradient(145deg, #1a3a46, #0c1e26);
      box-shadow: 
        inset 0 2px 4px rgba(255,255,255,0.05),
        inset 0 -2px 6px rgba(0,0,0,0.6),
        0 4px 10px rgba(0,0,0,0.5);
      color: #f9e27d;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #8faab3;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="app-container">

  <div class="user-btn" onclick="irUsuario()">
    <span class="material-symbols-rounded">person</span>
    Perfil
  </div>

  <div class="logo-header">
    <img src="logo.png" alt="Finanzas">
  </div>

  <div class="content">
    <h1>Llevá tus finanzas al siguiente nivel</h1>
  </div>

  <div class="menu">

    <a href="gastos.html">
      <div class="menu-button">
        <span class="material-symbols-rounded icon-3d">receipt_long</span>
        Gastos
      </div>
    </a>

    <a href="cuadro-de-resultados.html">
      <div class="menu-button">
        <span class="material-symbols-rounded icon-3d">insights</span>
        Cuadro de Resultados
      </div>
    </a>

    <a href="perfil-inversor-mas-cartera.html">
      <div class="menu-button">
        <span class="material-symbols-rounded icon-3d">trending_up</span>
        Perfil Inversor
      </div>
    </a>

    <a href="Calculadora-de-interes-compuesto.html">
      <div class="menu-button">
        <span class="material-symbols-rounded icon-3d">calculate</span>
        Interés
      </div>
    </a>

  </div>

  <div class="footer">
    Elite Finance v2.0
  </div>

</div>

<script>
function irUsuario() {
  window.location.href = "Usuario.html";
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "Instalar App";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.left = "50%";
  btn.style.transform = "translateX(-50%)";
  btn.style.padding = "12px 20px";
  btn.style.background = "#d4af37";
  btn.style.border = "none";
  btn.style.borderRadius = "10px";
  btn.style.fontWeight = "bold";
  btn.style.zIndex = "9999";

  document.body.appendChild(btn);

  btn.addEventListener("click", () => {
    btn.remove();
    deferredPrompt.prompt();
  });
});
</script>

</body>
</html>
