<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Interés Compuesto - Gold Edition</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Roboto, sans-serif;
}

body {
  /* Fondo con imagen y capa de oscuridad premium */
  background-image: linear-gradient(rgba(12, 30, 38, 0.85), rgba(12, 30, 38, 0.95)), 
                    url('—Pngtree—close-up of a detailed graph_16127929.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: white;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 30px 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 25px;
}

.header h2 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(to bottom, #f9e27d, #d4af37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.back-header-btn {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(212, 175, 55, 0.4);
  color: #d4af37;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
}

/* FORM CARD */
.form-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 22px;
  border-radius: 12px; /* Radios cortos */
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  background: rgba(12, 30, 38, 0.6);
  color: white;
  outline: none;
  font-size: 14px;
}

input:focus {
  border-color: #d4af37;
  background: rgba(12, 30, 38, 0.8);
}

input::placeholder {
  color: #5a737a;
}

/* BOTÓN CALCULAR */
.btn-calc {
  background: linear-gradient(145deg, #d4af37, #8a6d3b);
  color: #0c1e26;
  border: none;
  padding: 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 10px;
  transition: 0.3s;
}

.btn-calc:hover {
  transform: scale(1.02);
  box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
}

/* TARJETAS DE RESULTADOS */
.card {
  margin-top: 15px;
  padding: 18px;
  border-radius: 12px;
  text-align: center;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(212, 175, 55, 0.15);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Especial para Capital Final */
.card-final {
  background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(0, 0, 0, 0.4));
  border: 1px solid rgba(212, 175, 55, 0.4);
}

.card span {
  font-size: 11px;
  color: #cbdce0;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.card h2 {
  margin-top: 5px;
  font-size: 24px;
  font-weight: 800;
  color: #fff;
}

#final {
  color: #f9e27d;
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
}

/* BOTÓN VOLVER */
.back {
  margin-top: 25px;
  background: transparent;
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
  cursor: pointer;
  font-weight: 600;
  text-transform: uppercase;
  transition: 0.3s;
}

.back:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: #d4af37;
}

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <button class="back-header-btn" onclick="volver()">
      <span class="material-symbols-rounded">arrow_back</span>
    </button>
    <h2>Interés Compuesto</h2>
  </div>

  <div class="form-card">
    
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
        <span class="material-symbols-rounded" style="color:#d4af37; font-size:20px;">payments</span>
        <span style="font-size:12px; font-weight:700; color:#8faab3; text-transform:uppercase;">Inversión inicial</span>
    </div>
    <input type="number" id="inicial" placeholder="¿Con cuánto empezás?">

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; margin-top:5px;">
        <span class="material-symbols-rounded" style="color:#d4af37; font-size:20px;">add_circle</span>
        <span style="font-size:12px; font-weight:700; color:#8faab3; text-transform:uppercase;">Aporte mensual</span>
    </div>
    <input type="number" id="aporte" placeholder="¿Cuánto sumás por mes?">

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; margin-top:5px;">
        <span class="material-symbols-rounded" style="color:#d4af37; font-size:20px;">show_chart</span>
        <span style="font-size:12px; font-weight:700; color:#8faab3; text-transform:uppercase;">Tasa interés Mensual (%)</span>
    </div>
    <input type="number" id="tasa" placeholder="Interés estimado mensual">

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; margin-top:5px;">
        <span class="material-symbols-rounded" style="color:#d4af37; font-size:20px;">calendar_month</span>
        <span style="font-size:12px; font-weight:700; color:#8faab3; text-transform:uppercase;">Plazo (meses)</span>
    </div>
    <input type="number" id="meses" placeholder="Cantidad de meses">

    <button class="btn-calc" onclick="calcular()">Proyectar Capital</button>

  </div>

  <div class="card">
    <span>Capital aportado</span>
    <h2 id="aportado">$0</h2>
  </div>

  <div class="card">
    <span>Intereses generados</span>
    <h2 id="intereses">$0</h2>
  </div>

  <div class="card card-final">
    <span>Capital final proyectado</span>
    <h2 id="final">$0</h2>
  </div>

  <button class="back" onclick="volver()">Volver al menú</button>

</div>

<script>

function volver() {
  window.location.href = "index.html";
}

function calcular() {
  const inicial = parseFloat(document.getElementById("inicial").value) || 0;
  const aporte = parseFloat(document.getElementById("aporte").value) || 0;
  const tasa = (parseFloat(document.getElementById("tasa").value) || 0) / 100;
  const meses = parseInt(document.getElementById("meses").value) || 0;

  let capital = inicial;
  let totalAportado = inicial;

  for (let i = 0; i < meses; i++) {
    capital += aporte;
    totalAportado += aporte;
    capital = capital * (1 + tasa);
  }

  const intereses = capital - totalAportado;

  // Actualización de resultados con formato de moneda
  document.getElementById("aportado").innerText = "$" + totalAportado.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
  document.getElementById("intereses").innerText = "$" + intereses.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
  document.getElementById("final").innerText = "$" + capital.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});

  // Animación sutil de entrada
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    card.style.transform = "scale(1.05)";
    setTimeout(() => card.style.transform = "scale(1)", 200);
  });
}

</script>

</body>
</html>
